<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 대시보드</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* 메인 레이아웃 전용 스타일 확장 */
        body { 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            padding: 0; 
            background-color: #f4f7f6; 
            
        }
        
        /* 좌측 사이드바 */
        .sidebar {
            width: 260px;
            background-color: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }
        .sidebar .logo-placeholder { 
            margin-bottom: 30px; 
            height: 50px; 
            background: #eee; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold;
            border-radius: 8px;
        }
        .nav-group { margin-bottom: 25px; }
        .nav-title { font-size: 12px; color: #999; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .nav-item { 
            padding: 12px 15px; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-bottom: 4px; 
            font-size: 14px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: background 0.2s;
        }
        .nav-item:hover { background-color: #f0fdf4; color: #03a94d; }
        .sub-item { padding-left: 30px; font-size: 13px; color: #666; }

        /* 알림용 빨간 점 */
        .noti-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
            border: 1.5px solid #fff;
        }

        /* 사이드바 하단: 회사 선택 및 검색 */
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid #eee; }
        .company-select { 
            width: 100%; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #ddd; 
            margin-bottom: 10px; 
            font-size: 13px;
            outline: none;
        }
        .company-search { 
            width: 100%; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #ddd; 
            font-size: 13px; 
            outline: none;
        }

        /* 우측 메인 영역 */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* 상단 헤더 */
        .header {
            height: 70px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 40px;
            gap: 25px;
        }
        .user-link { 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
        }
        .user-link span { 
            color: var(--#03a94d);
            font-size: 12px; 
            font-weight: normal; 
            margin-left: 6px; 
        }
        .header-action { cursor: pointer; font-size: 14px; color: #555; position: relative; }
        .header-action:hover { color: #03a94d; }

        /* 알림 레이어 (슬라이드 애니메이션) */
        #noti-layer {
            position: absolute;
            top: 0;
            right: -380px;
            width: 380px;
            height: 100%;
            background: #fff;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            transition: right 0.3s ease-in-out;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        #noti-layer.open { right: 0; }
        .noti-top { 
            padding: 25px; 
            border-bottom: 1px solid #eee; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .noti-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .noti-card { 
            padding: 20px 25px; 
            border-bottom: 1px solid #f9f9f9; 
            position: relative; 
            font-size: 14px; 
            line-height: 1.4;
        }
        .noti-card:hover { background-color: #fcfcfc; }
        .noti-close-btn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: none; 
            border: none; 
            color: #ccc; 
            cursor: pointer; 
            font-size: 16px;
        }
        .noti-close-btn:hover { color: #ff4d4d; }

        /* 중앙 컨텐츠 영역 */
        .content-body { padding: 40px; flex: 1; overflow-y: auto; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-placeholder">로고</div>
        
        <nav class="nav-group">
            <div class="nav-title">팀 목록</div>
            <div class="nav-item">1팀 (SKM)</div>
            <div class="nav-item">2팀 (HG)</div>
            <div class="nav-item">3팀 (TV)</div>
        </nav>

        <nav class="nav-group">
            <div class="nav-title">시스템 및 운영</div>
            <div class="nav-item" onclick="location.href='log.html'">로그 확인</div>
            <div class="nav-item">ESG 담당자 페이지</div>
            <div class="nav-item sub-item" onclick="location.href='manager.html'">└ 관리페이지</div>
            <div class="nav-item sub-item" onclick="location.href='invite.html'">└ 초대페이지</div>
        </nav>

        <div class="sidebar-footer">
            <select class="company-select">
                <option>SKM</option>
                <option>HG</option>
                <option>TV</option>
            </select>
            <input type="text" class="company-search" placeholder="회사 검색...">
        </div>
    </aside>

    <div class="main-container">
        <header class="header">
            <div class="user-link" onclick="location.href='my_page.html'">
                이채훈 <span>(SKM)</span>
            </div>
            <div class="header-action" onclick="location.href='index.html'">로그아웃</div>
            <div class="header-action" onclick="toggleNoti()">
                알림
                <div class="noti-dot" style="position:absolute; top:-2px; right:-8px;"></div>
            </div>
        </header>

        <main class="content-body">
            <h1 style="color: #ddd;">여기에 대시보드 내용이 표시됩니다.</h1>
        </main>

        <div id="noti-layer">
            <div class="noti-top">
                <h3>알림 목록</h3>
                <span style="cursor:pointer; font-size: 20px;" onclick="toggleNoti()">×</span>
            </div>
            <div class="noti-list">
                <div class="noti-card">
                    신규 팀원 초대 요청이 승인되었습니다.
                    <button class="noti-close-btn" onclick="this.parentElement.remove()">×</button>
                </div>
                <div class="noti-card">
                    ESG 담당자 관리 페이지에 새로운 로그가 기록되었습니다.
                    <button class="noti-close-btn" onclick="this.parentElement.remove()">×</button>
                </div>
                <div class="noti-card">
                    비밀번호 변경 권장 알림입니다.
                    <button class="noti-close-btn" onclick="this.parentElement.remove()">×</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 알림 레이어 열고 닫기
        function toggleNoti() {
            const layer = document.getElementById('noti-layer');
            layer.classList.toggle('open');
        }
    </script>
</body>
</html>
