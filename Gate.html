<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We are IT Hero - ESG 통합 플랫폼</title>
    <link rel="stylesheet" href="Gate.css">
</head>
<body>
    <div class="bg-elements">
        <img src="./images/bg_img/bf_img_1.png" alt="background shape 1" class="bg-img bg-1">
        <img src="./images/bg_img/bf_img_2.png" alt="background shape 2" class="bg-img bg-2">
        <img src="./images/bg_img/bf_img_3.png" alt="background shape 3" class="bg-img bg-3">
    </div>

    <div class="container">
        <header class="header">
            <img src="./images/bg_img/logo.png" alt="We are IT Hero Logo" class="logo">
        </header>

        <main class="content-wrapper">
            <section class="main-banner">
                <div class="banner-overlay"></div>
                <div class="banner-text">
                    <h1>ESG 통합 플랫폼</h1>
                    <p>플랫폼에 대한 설명이 들어갑니다.<br>아자 아자 화이팅!</p>
                </div>
            </section>

            <section class="service-grid">
                <div class="service-card top-left">
                    <span class="badge">SKM</span>
                    <div class="icon-box">
                        <img src="./images/baseicon/clipboard.png" alt="icon" class="default-icon">
                        <img src="./images/hovericon/clipboard_hover.png" alt="icon hover" class="hover-icon">
                    </div>
                    <h2>ESG 보고서 요약<br>자동화 시스템</h2>
                </div>

                <div class="service-card top-right">
                    <span class="badge">HighGo!</span>
                    <div class="icon-box">
                        <img src="./images/baseicon/carbon-offset.png" alt="icon" class="default-icon">
                        <img src="./images/hovericon/carbon-offset_hover.png" alt="icon hover" class="hover-icon">
                    </div>
                    <h2>ESG 탄소배출량<br>관리 시스템</h2>
                </div>

                <div class="service-card bottom-left">
                    <span class="badge">TripleValues</span>
                    <div class="icon-box">
                        <img src="./images/baseicon/connectivity-lan.png" alt="icon" class="default-icon">
                        <img src="./images/hovericon/connectivity-lan_hover.png" alt="icon hover" class="hover-icon">
                    </div>
                    <h2>ESG 공급망<br>관리 시스템</h2>
                </div>

                <a href="login.html" class="service-card login-card bottom-right">
                    <span class="badge">Platform</span>
                    <div class="icon-box">
                        <img src="./images/baseicon/arrow-circle-right.png" alt="icon" class="default-icon">
                        <img src="./images/hovericon/arrow-circle-right_hover.png" alt="icon hover" class="hover-icon">
                    </div>
                    <h2>로그인</h2>
                </a>
            </section>
        </main>
    </div>
</body>
</html>
