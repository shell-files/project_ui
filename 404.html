<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 - 404 Error</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-container { text-align: center; background: #fff; padding: 60px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .error-code { font-size: 80px; font-weight: bold; color: #03a94d; margin-bottom: 10px; }
        .error-msg { font-size: 20px; color: #333; margin-bottom: 30px; }
        .btn-home { background-color: #03a94d; color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: opacity 0.2s; }
        .btn-home:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-msg">요청하신 페이지를 찾을 수 없습니다.</div>
        <p style="color: #666; margin-bottom: 40px;">입력하신 주소가 정확한지 다시 한번 확인해 주세요.</p>
        <a href="main.html" class="btn-home">메인으로 돌아가기</a>
    </div>
</body>
</html>
