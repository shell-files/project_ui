<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 폼</title>
    <link rel="stylesheet" href="../../styles/style.css">
</head>
<body>

<div id="signup_page" class="signup-container">
    <h1>회원가입</h1>

    <form>
        <section class="form-section">
            <h2 class="section-title">가입 정보</h2>
            <div class="input-group">
                <label>이름</label>
                <input type="email" placeholder="이메일을 입력해주세요">
            </div>
            <div class="input-group">
                <label>이메일</label>
                <input type="email" placeholder="이메일을 입력해주세요">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" placeholder="비밀번호를 입력해주세요">
            </div>
            <div class="input-group">
                <label>회사명</label>
                <input type="text">
            </div>
        </section>

        <hr class="divider">

        <div class="action-buttons">
            <button type="submit" class="btn-green btn-large">가입</button>
            <button type="button" class="btn-green btn-large">취소</button>
        </div>
    </form>
</div>

</body>
</html>
