<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 프로필 설정</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* [공통 레이아웃 유지] */
        body { display: flex; height: 100vh; overflow: hidden; padding: 0; background-color: #f4f7f6; }
        .sidebar { width: 260px; background-color: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .sidebar .logo-placeholder { margin-bottom: 30px; height: 50px; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; }
        .nav-group { margin-bottom: 25px; }
        .nav-title { font-size: 12px; color: #999; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 4px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .nav-item:hover { background-color: #f0fdf4; color: #03a94d; }
        .sub-item { padding-left: 30px; font-size: 13px; color: #666; }
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { height: 70px; background: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: flex-end; padding: 0 40px; gap: 25px; }
        .user-link { cursor: pointer; font-size: 15px; font-weight: 600; display: flex; align-items: center; }
        .user-link span { color: #03a94d; font-size: 12px; font-weight: normal; margin-left: 6px; }
        .content-body { padding: 40px; flex: 1; overflow-y: auto; }

        /* [마이페이지 전용 전문 디자인 스타일] */
        .profile-container { max-width: 900px; margin: 0 auto; }
        .profile-header-card {
            background: linear-gradient(135deg, #03a94d 0%, #007a37 100%);
            border-radius: 16px; padding: 40px; color: #fff;
            display: flex; align-items: center; gap: 30px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(3, 169, 77, 0.15);
        }

        .profile-text h2 { font-size: 26px; margin-bottom: 5px; color: #fff; }
        .profile-text p { opacity: 0.8; font-size: 14px; color: #fff; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .settings-card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 25px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 4px; height: 14px; background: #03a94d; border-radius: 2px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
        .form-group input { 
            width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; 
            background: #fcfcfc; font-size: 14px; outline: none; transition: 0.2s;
        }
        .form-group input:focus { border-color: #03a94d; background: #fff; box-shadow: 0 0 0 3px rgba(3, 169, 77, 0.05); }
        .form-group input[readonly] { background: #f5f5f5; color: #999; cursor: not-allowed; }

        /* 토글 스위치 디자인 */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ddd; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #03a94d; }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-update { width: 100%; padding: 14px; background: #03a94d; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-update:hover { background: #028a3f; }

        /* 알림 레이어 (기존 스타일 유지) */
        #noti-layer { position: absolute; top: 0; right: -380px; width: 380px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.05); transition: right 0.3s ease-in-out; z-index: 100; display: flex; flex-direction: column; }
        #noti-layer.open { right: 0; }
        .noti-top { padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-placeholder" onclick="location.href='main.html'" style="cursor:pointer;">로고</div>
        
        <nav class="nav-group">
            <div class="nav-title">팀 목록</div>
            <div class="nav-item">1팀 (SKM)</div>
            <div class="nav-item">2팀 (HG)</div>
            <div class="nav-item">3팀 (TV)</div>
        </nav>

        <nav class="nav-group">
            <div class="nav-title">시스템 및 운영</div>
            <div class="nav-item" onclick="location.href='log.html'">로그 확인</div>
            <div class="nav-item">ESG 담당자 페이지</div>
            <div class="nav-item sub-item" onclick="location.href='manager.html'">└ 관리페이지</div>
            <div class="nav-item sub-item" onclick="location.href='invite.html'">└ 초대페이지</div>
        </nav>

        <div class="sidebar-footer">
            <select class="company-select">
                <option>SKM</option>
                <option>HG</option>
                <option>TV</option>
            </select>
            <input type="text" class="company-search" placeholder="회사 검색...">
        </div>
    </aside>

    <div class="main-container">
        <header class="header">
            <div class="user-link" onclick="location.href='my_page.html'">
                이채훈 <span>(SKM)</span>
            </div>
            <div class="header-action" onclick="location.href='index.html'">로그아웃</div>
            <div class="header-action" onclick="toggleNoti()">
                알림 <div class="noti-dot" style="position:absolute; top:-2px; right:-8px; width:8px; height:8px; background:#ff4d4d; border-radius:50%; border:1.5px solid #fff;"></div>
            </div>
        </header>

        <main class="content-body">
            <div class="profile-container">
                <section class="profile-header-card">
                    <div class="profile-text">
                        <h2>이채훈</h2>
                        <p>SKM · ESG 데이터 운영 총괄</p>
                    </div>
                </section>

                <div class="settings-grid">
                    <div class="settings-card">
                        <div class="card-title">계정 정보 설정</div>
                        <div class="form-group">
                            <label>이메일 주소</label>
                            <input type="text" value="chaehoon@shell.com" readonly>
                        </div>
                        <div class="form-group">
                            <label>이름</label>
                            <input type="text" value="이채훈">
                        </div>
                        <div class="form-group">
                            <label>부서 및 직책</label>
                            <input type="text" value="전략기획팀 / 과장">
                        </div>
                        <button class="btn-update">정보 변경 저장</button>
                    </div>

                    <div class="settings-card">
                        <div class="card-title">보안 및 시스템 설정</div>
                        <div class="form-group">
                            <label>현재 비밀번호 확인</label>
                            <input type="password" placeholder="비밀번호 확인">
                        </div>
                        <div class="form-group">
                            <label>새 비밀번호</label>
                            <input type="password" placeholder="변경할 비밀번호 입력">
                        </div>
                        
                        <div class="card-title" style="font-size: 14px; margin-top: 25px; margin-bottom: 10px;">시스템 알림 설정</div>
                        <div class="toggle-row">
                            <span style="font-size: 14px; color: #555;">실시간 로그 업데이트 알림</span>
                            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                        </div>
                        <div class="toggle-row">
                            <span style="font-size: 14px; color: #555;">팀원 초대 승인 통보</span>
                            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div id="noti-layer">
            <div class="noti-top">
                <h3>알림 목록</h3>
                <span style="cursor:pointer; font-size: 20px;" onclick="toggleNoti()">×</span>
            </div>
            <div style="padding: 20px; text-align: center; color: #999; font-size: 14px;">새로운 알림이 없습니다.</div>
        </div>
    </div>

    <script>
        function toggleNoti() {
            const layer = document.getElementById('noti-layer');
            layer.classList.toggle('open');
        }
    </script>
</body>
</html>
