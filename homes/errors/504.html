<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>504 - Gateway Timeout</title>

  <style>
    #error_503_wrap {
      background-color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    #error_503_wrap .error-container {
      text-align: center;
      background: #fff;
      padding: 60px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid #e0e0e0;
    }

    #error_503_wrap .error-code {
      font-size: 80px;
      font-weight: bold;
      color: #03a94d;
      margin-bottom: 10px;
    }

    #error_503_wrap .error-msg {
      font-size: 20px;
      color: #333;
      margin-bottom: 30px;
    }

    #error_503_wrap p {
      color: #666;
      margin-bottom: 30px;
    }

    #error_503_wrap .btn-home {
      background-color: #03a94d;
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    #error_503_wrap .btn-home:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div id="error_503_wrap">
    <div class="error-container">
      <div class="error-code">504</div>
        <div class="error-msg">서버 응답이 지연되고 있습니다.</div>
        <p>
          요청 처리 중 시간이 초과되었습니다.<br>
          네트워크 상태를 확인하거나 잠시 후 다시 시도해 주세요.
        </p>
      <a href="../../index.html" class="btn-home">메인으로 돌아가기</a>
    </div>
  </div>
</body>
</html>
